version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://neondb_owner:npg_iAjfaLQ9UJx5@ep-cool-forest-aq67bzii-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require"
      JWT_SECRET: your-very-secret-key-change-in-production-2024
      JWT_REFRESH_SECRET: your-refresh-secret-change-in-production-2024
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
